# vim:set ft=tmux:
%hidden MODULE_NAME="git_branch"

set -ogq "@catppuccin_${MODULE_NAME}_icon" " "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{@thm_green}"
set -ogq "@catppuccin_${MODULE_NAME}_text" '#(cd "#{pane_current_path}" && git branch --show-current 2>/dev/null)'

source -F "#{d:current_file}/../utils/status_module.conf"
